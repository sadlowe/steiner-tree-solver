<header class="app-header">
  <div class="header-content">
    <div class="logo">
      <span class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"></circle><line x1="12" y1="8" x2="12" y2="12"></line><circle cx="6" cy="17" r="3"></circle><circle cx="18" cy="17" r="3"></circle><line x1="12" y1="12" x2="6" y2="14"></line><line x1="12" y1="12" x2="18" y2="14"></line></svg>
      </span>
      <h1 class="app-title">Résolveur d'Arbre de Steiner</h1>
    </div>
    <p class="app-subtitle">
      Visualisation interactive du problème de l'arbre de Steiner
    </p>
    <div class="header-actions">
      <a class="demo-btn" href="/demo.html" target="_blank" rel="noopener" aria-label="Ouvrir la démo pédagogique">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        Démo interactive
      </a>
      <button class="activity-btn" (click)="activityClick.emit()" aria-label="Ouvrir l'activite debranchee">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Activité
      </button>
      <button class="tutorial-btn" (click)="tutorialClick.emit()" aria-label="Open tutorial">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        How it works
      </button>
    </div>
  </div>
</header>
