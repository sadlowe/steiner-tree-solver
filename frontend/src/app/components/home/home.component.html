<main class="main-content">
  <div class="content-wrapper">
    <section class="canvas-section">
      <div class="canvas-header">
        <h2>Placement des points</h2>
        <p class="instructions-text">Cliquez sur le canvas pour ajouter des points</p>
      </div>
      <app-canvas
        [width]="950"
        [height]="580"
        [terminalPoints]="terminalPoints"
        [steinerPoints]="displaySteinerPoints"
        [edges]="edges"
        [edgeColor]="edgeColor"
        [isAddingEnabled]="!isLoading"
        (pointAdded)="onPointAdded($event)">
      </app-canvas>
    </section>

    <aside class="sidebar">
      <div class="stats-panel">
        <div class="stat-item">
          <span class="stat-label">Points</span>
          <span class="stat-value">{{ terminalPoints.length }}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Longueur</span>
          <span class="stat-value mono">{{ totalLength ? (totalLength | number:'1.2-2') : '-' }}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Steiner</span>
          <span class="stat-value">{{ steinerPoints.length || '-' }}</span>
        </div>
      </div>

      <app-controls
        [pointCount]="terminalPoints.length"
        [isLoading]="isLoading"
        [hasSolution]="hasSolution"
        [hasSteinerSolution]="hasSteinerSolution"
        [selectedMode]="selectedMode"
        (solve)="onSolve()"
        (clear)="onClear()"
        (clearSolution)="onClearSolution()"
        (modeChange)="onModeChange($event)">
      </app-controls>

      <app-info-panel
        [terminalPoints]="terminalPoints"
        [steinerPoints]="displaySteinerPoints"
        [edges]="edges"
        [totalLength]="totalLength"
        [naiveLength]="naiveLength"
        [mstLength]="mstLength"
        [steinerLength]="steinerLength"
        [selectedMode]="selectedMode">
      </app-info-panel>

      <div class="error-message" *ngIf="errorMessage">
        <span class="error-icon">⚠️</span>
        <p>{{ errorMessage }}</p>
        <button class="dismiss-btn" (click)="dismissError()">×</button>
      </div>
    </aside>
  </div>
</main>
