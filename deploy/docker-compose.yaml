services:
  backend:
    image: ghcr.io/sadlowe/steiner-tree-solver-backend:1.0.0
    restart: unless-stopped
    # Ne pull que si l'image n'est pas déjà présente localement
    pull_policy: if_not_present
    # .env optionnel : si absent, les valeurs par défaut de l'application s'appliquent
    env_file:
      - path: .env
        required: false
    networks:
      - steiner-net
    # Port interne uniquement, non exposé à l'extérieur (accès via Nginx)
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/steiner/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Délai étendu pour laisser la JVM démarrer
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  frontend:
    image: ghcr.io/sadlowe/steiner-tree-solver-frontend:1.0.0
    restart: unless-stopped
    pull_policy: if_not_present
    ports:
      - "80:80"
    networks:
      - steiner-net
    # Attend que le backend soit healthy avant de démarrer
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

networks:
  steiner-net:
    driver: bridge
