spring.application.name=steiner-tree-solver

server.port=8080

# Origine autorisée pour les requêtes CORS.
# Valeur par défaut : * (toutes). Surcharger via la variable CORS_ALLOWED_ORIGINS.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

logging.level.root=INFO
logging.level.com.terra.numerica=INFO
